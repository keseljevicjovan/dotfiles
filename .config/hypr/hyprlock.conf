general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
    no_fade_in = true
    no_fade_out = true
}

background {
    monitor =
    color = rgb(15, 15, 15)
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgb(240, 240, 240)
    font_size = 90
    font_family = JetBrains Mono Nerd Font, Sans
    position = 0, 100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %d. %B")"
    color = rgb(140, 140, 140)
    font_size = 14
    font_family = JetBrains Mono Nerd Font, Sans
    position = 0, 30
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 280, 50
    outline_thickness = 1
    
    dots_size = 0.25
    dots_spacing = 0.3
    dots_fade_time = 0
    fade_on_empty = false
    
    outer_color = rgb(60, 60, 60)
    inner_color = rgb(20, 20, 20)
    font_color = rgb(200, 200, 200)
    
    fail_color = rgb(100, 100, 100)
    fail_text = <i>Wrong Password</i>
    fail_transition = 0
    
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -80
    halign = center
    valign = center
}
